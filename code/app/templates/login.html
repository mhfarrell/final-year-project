<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>FlaskChat - Sign In</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
	</head>
	<body>
		<div id="login-page">
			<div id="login-form">
				<div style="margin-top: 18px;">
					<form action="/register" class="{{ altForm }}" method="POST">
						<div><span>Create Account</span></div>
						<br/>
						<div><span style="font-size: 0.8em; font-weight: 400;">{{ registerMessage }}</span></div>
						<br/>
						<input type="text" name="firstname" placeholder="First Name"/>
						<input type="text" name="surname" placeholder="Surname"/>
						<input type="email" name="email" placeholder="Email"/>
						<input type="text" name="company" placeholder="Company"/>
						<input type="text" name="username" placeholder="Username"/>
						<input type="password" name="password" placeholder="Password"/>
						<input type="password" name="rPassword" placeholder="Repeat Password"/>
						<button type="submit" id="register">Register</button>
						<p class="message">Already registered? <a href="#">Sign In</a></p>
					</form>
					<form action="/login" class="{{ Form }}" method="POST">
						<div><span>Sign In</span></div>
						<br/>
						<div><span style="font-size: 0.8em; font-weight: 400;">{{ loginMessage }}</span></div>
						<br/>
						<input type="text" name="username" placeholder="Username"/>
						<input type="password" name="password" placeholder="Password"/>
						<br/>
						<button type="submit" id="login">Sign In</button>
						<p class="message">Not registered? <a href="#">Create an account</a></p>
					</form>
				</div>
			</div>
		</div>
		<script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script>
		<script>
		$('.message a').click(function(){
			$('form, .login-page').animate({height: "toggle", opacity: "toggle"}, "slow");
		});
		</script>
	</body>
</html>
